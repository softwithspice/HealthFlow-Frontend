<div class="body">
  <div class="card">
    <h1 class="title">Verify Code</h1>
    <p class="subtitle">Enter the 6-digit code sent to <strong>{{ email }}</strong></p>

    <div class="field">
      <label class="label">Verification Code</label>
      <div class="code-inputs" (paste)="onPaste($event)">
        @for (digit of digits; track $index) {
          <input
            #digitInput
            type="text"
            inputmode="numeric"
            maxlength="1"
            class="code-box"
            [value]="digits[$index]"
            (input)="onDigitInput($event, $index)"
            (keydown)="onKeyDown($event, $index)"
          />
        }
      </div>
    </div>

    @if (errorMessage) {
      <div class="error-msg">{{ errorMessage }}</div>
    }
    @if (successMessage) {
      <div class="success-msg">{{ successMessage }}</div>
    }

    <button
      type="button"
      class="btn-primary"
      [disabled]="loading || !isCodeComplete()"
      (click)="verifyCode()"
    >
      @if (!loading) { <span>Verify Code</span> }
      @if (loading)  { <span class="spinner"></span> }
    </button>

    <p class="back-row">
      Didn't receive a code?
      <a (click)="resend()" class="link">Resend</a>
    </p>
  </div>
</div>
