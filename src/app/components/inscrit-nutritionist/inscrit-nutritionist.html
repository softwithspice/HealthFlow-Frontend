<div class="page">
  <div class="card">

    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="white" width="20" height="20">
          <path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2zm1 14h-2v-5h2v5zm0-7h-2V7h2v2z"/>
        </svg>
      </div>
      <span class="logo-text">HealthFlow</span>
    </div>

    <h1>Join HealthFlow</h1>
    <p class="subtitle">Subscribe as a Nutritionist 🥗</p>

    <form #inscritForm="ngForm">

      <p class="section-label">Personal info</p>
      <div class="row g-3">
        <div class="col-md-6">
          <label>First name</label>
          <input type="text" [(ngModel)]="formData.prenom" name="prenom" placeholder="First name" required>
        </div>
        <div class="col-md-6">
          <label>Last name</label>
          <input type="text" [(ngModel)]="formData.nom" name="nom" placeholder="Last name" required>
        </div>
      </div>

      <div class="field">
        <label>Email address</label>
        <input type="email" [(ngModel)]="formData.email" name="email" placeholder="nutritionist@example.com" required>
      </div>

      <div class="field">
        <label>Phone number</label>
        <input type="tel" [(ngModel)]="formData.tel" name="tel" placeholder="+216 XX XXX XXX">
      </div>

      <div class="field">
        <label>Location</label>
        <input type="text" [(ngModel)]="formData.localisation" name="localisation" placeholder="City, State / Country">
      </div>

      <p class="section-label">Professional info</p>

      <div class="field">
        <label>Speciality</label>
        <select [(ngModel)]="formData.specialite" name="specialite">
          <option value="">Select your speciality</option>
          <option value="WEIGHT_LOSS">Weight Loss</option>
          <option value="SPORTS">Sports Nutrition</option>
          <option value="CLINICAL">Clinical Nutrition</option>
          <option value="HOSPITAL">Hospital Nutrition</option>
          <option value="PEDIATRIC">Pediatric Nutrition</option>
          <option value="OTHER">Other</option>
        </select>
      </div>

      <p class="section-label">Subscription plan</p>
      <div class="plan-grid">

        <div class="plan-card" [class.selected]="formData.typeAbonnement === 'MOIS_1'"
             (click)="formData.typeAbonnement = 'MOIS_1'">
          <div class="plan-check"></div>
          <div class="plan-duration">1 Month</div>
          <div class="plan-price">300 <span>DT</span></div>
          <div class="plan-save">300 DT / month</div>
        </div>

        <div class="plan-card" [class.selected]="formData.typeAbonnement === 'MOIS_3'"
             (click)="formData.typeAbonnement = 'MOIS_3'">
          <div class="plan-check"></div>
          <div class="plan-duration">3 Months</div>
          <div class="plan-price">750 <span>DT</span></div>
          <div class="plan-save">250 DT / month</div>
        </div>

        <div class="plan-card" [class.selected]="formData.typeAbonnement === 'MOIS_6'"
             (click)="formData.typeAbonnement = 'MOIS_6'">
          <div class="plan-check"></div>
          <div class="plan-duration">6 Months</div>
          <div class="plan-price">1320 <span>DT</span></div>
          <div class="plan-save">220 DT / month</div>
        </div>

        <div class="plan-card" [class.selected]="formData.typeAbonnement === 'AN_1'"
             (click)="formData.typeAbonnement = 'AN_1'">
          <div class="plan-check"></div>
          <div class="plan-duration">1 Year ⭐</div>
          <div class="plan-price">2160 <span>DT</span></div>
          <div class="plan-save">180 DT / month</div>
        </div>

      </div>

      <p class="section-label">Security</p>
      <div class="row g-3">
        <div class="col-md-6">
          <label>Password</label>
          <input type="password" [(ngModel)]="formData.pwd" name="pwd" placeholder="••••••••" required>
        </div>
        <div class="col-md-6">
          <label>Confirm password</label>
          <input type="password" [(ngModel)]="confirmPwd" name="confirmPwd" placeholder="••••••••">
        </div>
      </div>

      <div class="check-row">
        <input type="checkbox" [(ngModel)]="agreed" name="agreed" id="terms-n">
        <label for="terms-n">
          I agree to the <span class="link">Terms and Conditions</span> and <span class="link">Privacy Policy</span>
        </label>
      </div>

      <!-- ✅ type="button" pour éviter le submit du formulaire -->
      <button type="button" [disabled]="!agreed" (click)="register()">Subscribe now 🎉</button>

    </form>

    <p class="login-link">
      Already have an account?
      <span class="link" [routerLink]="['/authentification','nutritionist']">Log in</span>
    </p>

  </div>
</div>
