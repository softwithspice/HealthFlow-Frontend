<div class="page">
  <div class="card">

    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="white" width="20" height="20">
          <path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2zm1 14h-2v-5h2v5zm0-7h-2V7h2v2z"/>
        </svg>
      </div>
      <span class="logo-text">HealthFlow</span>
    </div>

    <h1>Join HealthFlow</h1>
    <p class="subtitle">Subscribe as a Coach 💪</p>

    <form (ngSubmit)="register()">

      <p class="section-label">Personal info</p>
      <div class="grid-2">
        <div class="field">
          <label>First name</label>
          <input type="text" [(ngModel)]="formData.prenom" name="prenom" placeholder="First name" required>
        </div>
        <div class="field">
          <label>Last name</label>
          <input type="text" [(ngModel)]="formData.nom" name="nom" placeholder="Last name" required>
        </div>
      </div>

      <div class="field">
        <label>Email address</label>
        <input type="email" [(ngModel)]="formData.email" name="email" placeholder="coach@example.com" required>
      </div>

      <div class="field">
        <label>Phone number</label>
        <input type="tel" [(ngModel)]="formData.tel" name="tel" placeholder="+216 XX XXX XXX">
      </div>

      <p class="section-label">Professional info</p>

      <div class="field">
        <label>Speciality</label>
        <select [(ngModel)]="formData.coachSpecialite" name="coachSpecialite">
          <option value="">Select your coaching type</option>
          <option value="FITNESS">Fitness Coach</option>
          <option value="PERSONAL">Personal Training</option>
          <option value="STRENGTH">Strength & Conditioning</option>
          <option value="YOGA">Yoga Instructor</option>
          <option value="WELLNESS">Wellness Coach</option>
          <option value="LIFE">Life Coach</option>
        </select>
      </div>

      <div class="field">
        <label>Certifications</label>
        <textarea
          [(ngModel)]="formData.certifications"
          name="certifications"
          placeholder="List your certifications (e.g. ACE, NASM, ISSA)">
        </textarea>
      </div>

      <p class="section-label">Security</p>
      <div class="grid-2">
        <div class="field">
          <label>Password</label>
          <input type="password" [(ngModel)]="formData.pwd" name="pwd" placeholder="••••••••" required>
        </div>
        <div class="field">
          <label>Confirm password</label>
          <input type="password" [(ngModel)]="confirmPwd" name="confirmPwd" placeholder="••••••••">
        </div>
      </div>

      <div class="check-row">
        <input type="checkbox" [(ngModel)]="agreed" name="agreed" id="terms-c">
        <label for="terms-c">
          I agree to the <span class="link">Terms and Conditions</span> and <span class="link">Privacy Policy</span>
        </label>
      </div>

      <button type="submit" class="btn-submit" [disabled]="!agreed">Subscribe now 🎉</button>
    </form>

    <p class="login-link">
      Already have an account?
      <span class="link" [routerLink]="['/authentification','coach']">Log in</span>
    </p>

  </div>
</div>
